<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Selective Proxy VPN</title>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    width: 300px;
    margin: 0;
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #1e1f26;
    color: #e6e6e6;
  }

  h1 {
    font-size: 15px;
    font-weight: 600;
    margin: 0 0 12px 0;
    color: #ffffff;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  h1::before {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4caf7d;
    display: inline-block;
  }

  /* Section labels (used above the proxy server fields and the site list) */
  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: #6b6c76;
    margin: 14px 0 6px 0;
  }

  .section-label:first-of-type {
    margin-top: 0;
  }

  /* Row containing the proxy server address + port inputs */
  .proxy-config-row {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
  }

  #proxy-address-input {
    flex: 2;
  }

  #proxy-port-input {
    flex: 1;
  }

  .text-input {
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid #3a3b45;
    background: #2a2b34;
    color: #ffffff;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s ease;
    width: 100%;
  }

  .text-input:focus {
    border-color: #4caf7d;
  }

  .secondary-btn {
    padding: 8px 14px;
    border: 1px solid #3a3b45;
    border-radius: 8px;
    background: transparent;
    color: #e6e6e6;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  .secondary-btn:hover {
    border-color: #4caf7d;
    background: rgba(76, 175, 125, 0.08);
  }

  /* Row containing the domain input field and the "Add" button */
  .input-row {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
  }

  #domain-input {
    flex: 1;
  }

  #add-btn {
    padding: 8px 14px;
    border: none;
    border-radius: 8px;
    background: #4caf7d;
    color: #0f1710;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  #add-btn:hover {
    background: #5cc98f;
  }

  /* Validation / status messages */
  #error-msg {
    font-size: 11px;
    color: #ff6b6b;
    margin: -2px 0 8px 0;
    min-height: 14px;
  }

  #status-msg {
    font-size: 11px;
    color: #4caf7d;
    margin: -2px 0 8px 0;
    min-height: 14px;
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  #status-msg.visible {
    opacity: 1;
  }

  /* Scrollable list of proxied sites */
  #site-list {
    list-style: none;
    margin: 0;
    padding: 0;
    max-height: 180px;
    overflow-y: auto;
  }

  #site-list::-webkit-scrollbar {
    width: 6px;
  }

  #site-list::-webkit-scrollbar-thumb {
    background: #3a3b45;
    border-radius: 3px;
  }

  /* Single site row: domain name + remove button */
  .site-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    margin-bottom: 6px;
    background: #2a2b34;
    border-radius: 8px;
    font-size: 13px;
  }

  .site-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding-right: 8px;
  }

  .remove-btn {
    border: none;
    background: transparent;
    color: #ff6b6b;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    line-height: 1;
    padding: 4px 6px;
    border-radius: 6px;
    transition: background 0.15s ease;
  }

  .remove-btn:hover {
    background: rgba(255, 107, 107, 0.15);
  }

  /* Message shown when the site list is empty */
  .empty-msg {
    text-align: center;
    color: #6b6c76;
    font-size: 12px;
    padding: 16px 0;
  }

  hr {
    border: none;
    border-top: 1px solid #3a3b45;
    margin: 14px 0;
  }
</style>
</head>
<body>

  <h1>Selective Proxy</h1>

  <!-- Proxy server configuration -->
  <div class="section-label">Proxy server (SOCKS5)</div>
  <div class="proxy-config-row">
    <input type="text" id="proxy-address-input" class="text-input" placeholder="127.0.0.1" />
    <input type="text" id="proxy-port-input" class="text-input" placeholder="1080" />
  </div>
  <button id="save-proxy-btn" class="secondary-btn">Save proxy settings</button>

  <hr />

  <!-- Site list management -->
  <div class="section-label">Sites routed through proxy</div>
  <div class="input-row">
    <input type="text" id="domain-input" class="text-input" placeholder="example.com" />
    <button id="add-btn">Add</button>
  </div>

  <!-- Validation error messages appear here -->
  <div id="error-msg"></div>

  <!-- Success / status messages appear here -->
  <div id="status-msg"></div>

  <!-- Dynamically populated list of sites currently being proxied -->
  <ul id="site-list"></ul>

  <script src="popup.js"></script>
</body>
</html>
